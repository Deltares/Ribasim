name: Docs
on:
  push:
    branches: [main]
    paths: ["core/**", "docs/**", "python/**", "pixi.toml", "pixi.lock"]
  pull_request:
    paths: ["core/**", "docs/**", "python/**", "pixi.toml", "pixi.lock"]
  merge_group:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# needed to allow julia-actions/cache to delete old caches that it has created
permissions:
  actions: write
  contents: read
jobs:
  publish:
    name: Docs Julia
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: write
      contents: write
    steps:
      - name: Configure Git for quarto-publish
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Propagate git credentials for v6
        run: |
          # Propagate git credentials to worktrees (required for actions/checkout@v6)
          # See: https://github.com/quarto-dev/quarto-actions/issues/133
          if git config get includeIf.gitdir:"$(git rev-parse --path-format=absolute --git-dir)".path &>/dev/null; then
            GIT_DIR=$(git rev-parse --path-format=absolute --git-dir)
            CRED_PATH=$(git config get --path includeIf.gitdir:"${GIT_DIR}".path)
            git config set --path includeIf.gitdir:"${GIT_DIR}/worktrees/*".path "${CRED_PATH}"
          fi
      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0
      - name: Cache Delwaq map file
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ribasim
          key: delwaq-map-${{ github.run_id }}
          restore-keys: |
            delwaq-map-
      - uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          pixi-version: "latest"
      - name: Prepare pixi
        run: pixi run install-ci
      - name: Check Quarto installation and all engines
        run: pixi run quarto-check
      - name: Render Quarto Project
        run: pixi run quarto-render
      - name: Publish Quarto Project
        if: github.ref == 'refs/heads/main'
        run: pixi run quarto-publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
